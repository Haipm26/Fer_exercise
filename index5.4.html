<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 5.4 - FPT University</title>
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css">
    <style>
        .brand-header {
            background: #f28c28;
        }

        .brand-logo {
            max-width: min(44rem, 80vw);
        }

        .brand-nav .nav-link {
            color: #fff;
            font-size: 1.45rem;
        }

        .content-band {
            min-height: 27rem;
        }

        .site-footer {

        }

<body>

            <a class="nav-link" href="#about">About</a>
            <a class="nav-link" href="#contact">Contact</a>
        </nav>

    <main class="container content-band py-5 text-center">
        <section id="about" class="py-4">
            <h1 class="h2 fw-bold mb-4">About</h1>
            <p class="fs-4">This is the about section of the website.</p>
        </section>
        <section id="contact" class="py-4">
            <h2 class="h2 fw-bold mb-4">Contact</h2>
            <p class="fs-4">For any inquiries, please contact us at example@example.com.</p>

    </main>

    <footer class="site-footer py-5 text-center">&copy; 2023 Website. All rights reserved.</footer>
